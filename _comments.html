<div id="comments-list">
  {{#commentDtos}}
    <div class="card m-2" id="comments-{{id}}">
      <div class="card-header">
        {{nickname}}
      </div>
      <div class="card-body">
        {{body}}
      </div>
    </div>
  {{/commentDtos}}
</div>

<script>
{
  // 16장: 웹 페이지가 로드될 때 댓글 목록을 비동기로 가져오는 fetch API 예시
  const articleId = "[[${article.id}]]"; // 타임리프 또는 머스테치 게시글 ID 변수 수신
  const url = `/api/articles/${articleId}/comments`;
  
  fetch(url)
    .then(response => response.json())
    .then(comments => {
      console.log("댓글 목록 로드 완료:", comments);
      // 수신한 JSON 데이터를 바탕으로 프론트엔드 화면에 동적 DOM 마운트 처리 진행
    })
    .catch(error => console.error("댓글 로드 실패:", error));
}
</script>
